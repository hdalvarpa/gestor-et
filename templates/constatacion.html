{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Generar Formato de Constatación</h4>
    </div>
    <div class="card-body">
        <form action="#" method="POST" enctype="multipart/form-data" onkeydown="return event.key != 'Enter';">
            <h5 class="mb-3 border-bottom pb-2 text-primary">Cargar Datos</h5>

            <div class="mb-4 bg-light p-3 rounded border">
                <p class="mb-2 text-muted">Antes de cargar sus datos, por favor descargue y llene la plantilla de Excel:
                </p>
                <a href="/descargar_plantilla_fc" class="btn btn-outline-info">
                    ⬇️ Descargar Plantilla
                </a>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Archivo Excel</label>
                    <input type="file" class="form-control form-control-lg" name="archivo_excel" accept=".xlsx, .xls"
                        required>
                </div>
            </div>

            <div class="mt-4 text-end">
                <button type="submit" class="btn btn-lg btn-success">
                    Generar Documentos
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
