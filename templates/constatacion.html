{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h4 class="mb-0 fw-bold">Generar Formato de Constatación</h4>
    </div>
    <div class="card-body">
        <form action="#" method="POST" enctype="multipart/form-data" onkeydown="return event.key != 'Enter';">
            <h5 class="mb-4 pb-2 border-bottom text-primary">Cargar Datos</h5>

            <div class="mb-4 p-4 rounded" style="background: rgba(99, 102, 241, 0.04); border: 1px solid rgba(99, 102, 241, 0.15);">
                <p class="mb-3 text-light" style="font-weight: 300;">Antes de cargar sus datos, por favor descargue y llene la plantilla de Excel.</p>
                <a href="/descargar_plantilla_fc" class="btn btn-outline-info">
                    ⬇️ Descargar Plantilla
                </a>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Archivo Excel</label>
                    <input type="file" class="form-control form-control-lg" name="archivo_excel" accept=".xlsx, .xls"
                        required>
                </div>
            </div>

            <div class="mt-4 text-end">
                <button type="submit" class="btn btn-lg btn-success">
                    Generar Documentos
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
