{% extends "base.html" %}

{% block content %}
    <div class="mb-4">
        <h1 class="fw-bold" style="letter-spacing: -0.02em;">Bienvenido al Panel de Control.</h1>
        <p class="opacity-75" style="font-weight: 300; font-size: 1.05rem;">Selecciona una opción del menú para comenzar.</p>
    </div>
    
    <div class="row mt-4">
        <div class="col-md-4 mb-3">
            <div class="card text-center p-4 h-100" style="position: relative;">
                <div class="d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 56px; height: 56px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.15)); border: 1px solid rgba(99, 102, 241, 0.25); border-radius: 16px;">
                    <span style="font-size: 1.6rem;">📄</span>
                </div>
                <h5 class="fw-bold mb-2">Generar PDF</h5>
                <p class="small opacity-75 mb-3" style="font-weight: 300;">Ficha de inscripción y documentos técnicos.</p>
                <a href="/formulario" class="btn btn-primary mt-auto">Ir ahora</a>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center p-4 h-100" style="position: relative;">
                <div class="d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 56px; height: 56px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.15)); border: 1px solid rgba(99, 102, 241, 0.25); border-radius: 16px;">
                    <span style="font-size: 1.6rem;">📋</span>
                </div>
                <h5 class="fw-bold mb-2">Formato de Constatación</h5>
                <p class="small opacity-75 mb-3" style="font-weight: 300;">Generar documentos de constatación desde Excel.</p>
                <a href="/constatacion" class="btn btn-primary mt-auto">Ir ahora</a>
            </div>
        </div>
    </div>
{% endblock %}
