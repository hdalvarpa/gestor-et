<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración | PTP-FIPI</title>
  <meta name="description" content="Sistema de generación de fichas de inscripción y documentos técnicos PTP-FIPI-CVSP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ==============================
       RESET & BASE
    ============================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0a0e1a;
      position: relative;
    }

    /* ==============================
       ANIMATED GRADIENT BACKGROUND
    ============================== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      z-index: 0;
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(3deg); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 350px;
      height: 350px;
      background: rgba(99, 102, 241, 0.35);
      top: -80px;
      left: -60px;
      animation-duration: 10s;
    }

    .orb-2 {
      width: 280px;
      height: 280px;
      background: rgba(139, 92, 246, 0.3);
      bottom: -60px;
      right: -40px;
      animation-duration: 12s;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: rgba(59, 130, 246, 0.25);
      top: 50%;
      right: 20%;
      animation-duration: 9s;
      animation-delay: -5s;
    }

    @keyframes orbFloat {
      0%   { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-40px) translateX(20px); }
    }

    /* ==============================
       GLASSMORPHISM CARD
    ============================== */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 48px 40px 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px) scale(0.97);
    }

    @keyframes cardEntrance {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Subtle top-border glow */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.6), rgba(99, 102, 241, 0.6), transparent);
      border-radius: 2px;
    }

    /* ==============================
       HEADER / ICON
    ============================== */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35); }
      50%      { box-shadow: 0 4px 30px rgba(99, 102, 241, 0.55); }
    }

    .login-icon svg {
      width: 30px;
      height: 30px;
      fill: white;
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
    }

    .login-header p {
      font-size: 0.9rem;
      color: rgba(203, 213, 225, 0.6);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ==============================
       FORM INPUTS
    ============================== */
    .input-group {
      position: relative;
      margin-bottom: 22px;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(203, 213, 225, 0.7);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: rgba(148, 163, 184, 0.5);
      transition: fill 0.3s ease;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #f1f5f9;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-wrapper input::placeholder {
      color: rgba(148, 163, 184, 0.35);
    }

    .input-wrapper input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .input-wrapper input:focus + svg,
    .input-wrapper:has(input:focus) svg {
      fill: rgba(139, 92, 246, 0.9);
    }

    /* ==============================
       SUBMIT BUTTON
    ============================== */
    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }

    .btn-login:hover::before {
      opacity: 1;
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    /* ==============================
       ERROR ALERT
    ============================== */
    .alert-error {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.85rem;
      font-weight: 400;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: shakeIn 0.5s ease;
    }

    .alert-error svg {
      width: 16px;
      height: 16px;
      fill: #f87171;
      flex-shrink: 0;
    }

    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      15%      { transform: translateX(-6px); }
      30%      { transform: translateX(5px); }
      45%      { transform: translateX(-4px); }
      60%      { transform: translateX(3px); }
      75%      { transform: translateX(-1px); }
    }

    /* ==============================
       FOOTER
    ============================== */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(148, 163, 184, 0.35);
      font-weight: 300;
    }

    /* ==============================
       RESPONSIVE
    ============================== */
    @media (max-width: 480px) {
      .login-card {
        margin: 16px;
        padding: 36px 28px 32px;
        border-radius: 20px;
      }

      .login-header h1 {
        font-size: 1.4rem;
      }

      .login-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }

      .login-icon svg {
        width: 26px;
        height: 26px;
      }
    }
  </style>
</head>

<body>

  <!-- Floating ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">

    <!-- Header with icon -->
    <div class="login-header">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z"/>
        </svg>
      </div>
      <h1>Panel de Administración</h1>
      <p>Acceso exclusivo para administradores.</p>
    </div>

    <!-- Login form -->
    <form action="validar" method="POST" id="loginForm">

      <div class="input-group">
        <label for="usuario">Usuario Administrador</label>
        <div class="input-wrapper">
          <input type="text" id="usuario" name="usuario" placeholder="Ej: admin1" autocomplete="username" required>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
          </svg>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        Ingresar
      </button>
    </form>

    {% if error %}
    <div class="alert-error" role="alert">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <div class="login-footer">
      Sistema PTP-FIPI-CVSP &copy; 2025
    </div>

  </div>

</body>

</html>
